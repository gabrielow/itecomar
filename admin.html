<!DOCTYPE html>
<!--
  Página de login para GitHub Pages (ite.com.ar/admin.html)
  → Copiar este archivo como admin.html en el repo gabrielow/itecomar
  → Requiere que admin.ite.com.ar apunte a localhost:3001 via Cloudflare Tunnel
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Admin — ITe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      font-family: 'Jura', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: .3rem; }
    .login-card .sub { color: #666; font-size: .875rem; margin-bottom: 2rem; }
    label { font-size: .875rem; color: #aaa; margin-bottom: .4rem; display: block; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: .75rem 2.8rem .75rem 1rem;
      background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
      color: #fff; font-family: 'Jura', sans-serif; font-size: .95rem;
      outline: none; transition: border-color .2s;
    }
    .input-wrap input:focus { border-color: #555; }
    .toggle-pw {
      position: absolute; right: .7rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #666; cursor: pointer; font-size: 1.1rem; padding: 0;
    }
    .btn-ingresar {
      width: 100%; margin-top: 1.5rem; padding: .8rem;
      background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 8px;
      color: #e0e0e0; font-family: 'Jura', sans-serif; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: background .2s, border-color .2s;
    }
    .btn-ingresar:hover:not(:disabled) { background: #242424; border-color: #555; }
    .btn-ingresar:disabled { opacity: .6; cursor: default; }
    #error-msg { color: #e05555; font-size: .85rem; margin-top: .6rem; display: none; }
    .back-link { text-align: center; margin-top: 1.5rem; font-size: .85rem; }
    .back-link a { color: #666; text-decoration: none; }
    .back-link a:hover { color: #aaa; }
  </style>
</head>
<body>
<div class="login-card">
  <h1>🤖 Panel de Administración</h1>
  <p class="sub">ITe — Inteligencia Tecnológica</p>

  <form id="form-login">
    <label for="token">Clave de acceso</label>
    <div class="input-wrap">
      <input type="password" id="token" placeholder="••••••••••••••••" autocomplete="current-password" required>
      <button type="button" class="toggle-pw" id="btn-toggle">👁</button>
    </div>
    <p id="error-msg">Clave incorrecta. Intentá de nuevo.</p>
    <button type="submit" class="btn-ingresar" id="btn-submit">Ingresar al panel</button>
  </form>

  <div class="back-link"><a href="https://ite.com.ar">← Volver a ite.com.ar</a></div>
</div>

<script>
'use strict';
const ADMIN_URL = 'https://admin.ite.com.ar';  // Cloudflare Tunnel → localhost:3001

document.getElementById('btn-toggle').addEventListener('click', () => {
  const inp = document.getElementById('token');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

document.getElementById('form-login').addEventListener('submit', async e => {
  e.preventDefault();
  const btn   = document.getElementById('btn-submit');
  const errEl = document.getElementById('error-msg');
  const token = document.getElementById('token').value.trim();

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Verificando…';

  try {
    const r = await fetch(ADMIN_URL + '/api/auth/verify', {
      headers: { 'Authorization': 'Bearer ' + token },
    });

    if (r.ok) {
      // Pasar token via hash (cross-origin: sessionStorage no comparte entre orígenes)
      window.location = ADMIN_URL + '/#t=' + encodeURIComponent(token);
    } else {
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar al panel';
    }
  } catch {
    errEl.textContent = 'No se pudo conectar con el servidor. Verificá tu conexión.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Ingresar al panel';
  }
});
</script>
</body>
</html>
